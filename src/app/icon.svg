<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0f1923"/>
  <!-- TV body -->
  <rect x="4" y="6" width="56" height="38" rx="7" fill="#162232" stroke="#22c55e" stroke-width="2.5"/>
  <!-- Screen -->
  <rect x="10" y="12" width="44" height="26" rx="4" fill="#0a2210"/>
  <!-- Field center line -->
  <line x1="32" y1="12" x2="32" y2="38" stroke="#22c55e" stroke-width="1.2" stroke-opacity="0.5"/>
  <!-- Field center circle -->
  <circle cx="32" cy="25" r="7" fill="none" stroke="#22c55e" stroke-width="1.2" stroke-opacity="0.5"/>
  <!-- Football -->
  <circle cx="32" cy="25" r="8" fill="white"/>
  <!-- Ball pentagons -->
  <path d="M32 18 L35.5 20.5 L34 24.5 L30 24.5 L28.5 20.5 Z" fill="#1a1a2e" opacity="0.2"/>
  <!-- Ball seams -->
  <path d="M25 21.5 Q32 18 39 21.5" stroke="#666" stroke-width="0.9" fill="none"/>
  <path d="M25 28.5 Q32 32 39 28.5" stroke="#666" stroke-width="0.9" fill="none"/>
  <line x1="28.5" y1="17.5" x2="27" y2="32.5" stroke="#666" stroke-width="0.9"/>
  <line x1="35.5" y1="17.5" x2="37" y2="32.5" stroke="#666" stroke-width="0.9"/>
  <!-- Stand -->
  <line x1="24" y1="44" x2="21" y2="56" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="44" x2="43" y2="56" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="56" x2="46" y2="56" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
</svg>
